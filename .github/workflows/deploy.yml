name: Landing PAGE

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Costruir imagen de docker
      run: docker build -t ghcr.io/jpaandrango/landing:1.0.0 .
    
    - name: Login en GitHub Container Registry
      run: echo "${{ secrets.GHCR_PATH }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
    
    - name: Publicar la imagen creada
      run: docker push ghcr.io/jpaandrango/landing:1.0.0